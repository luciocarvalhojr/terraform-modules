name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for release notes generation

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Usage

            Reference any module from this release:

            ```hcl
            module "vm" {
              source = "github.com/luciocarvalhojr/terraform-modules//modules/proxmox-vm?ref=${{ github.ref_name }}"
              # ...
            }

            module "dns" {
              source = "github.com/luciocarvalhojr/terraform-modules//modules/dns-record?ref=${{ github.ref_name }}"
              # ...
            }

            module "node" {
              source = "github.com/luciocarvalhojr/terraform-modules//modules/k3s-node?ref=${{ github.ref_name }}"
              # ...
            }

            module "bucket" {
              source = "github.com/luciocarvalhojr/terraform-modules//modules/minio-bucket?ref=${{ github.ref_name }}"
              # ...
            }
            ```

            See [README](https://github.com/luciocarvalhojr/terraform-modules/blob/main/README.md) for full documentation.
